<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>מצפן השינוי | ערכת הובלת שינוי בעידן ה-AI</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Rubik:wght@400;500;600;700;800;900&family=Heebo:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
<style>
  :root{
    /* Blanchard brand tokens, sampled from official assets */
    --navy:#001737;
    --navy-soft:#0B2B52;
    --deep: var(--navy);
    --paper:#F7F9FB;
    --paper-alt:#EEF2F6;
    --card:#FFFFFF;
    --card-solid:#FFFFFF;
    --ink:#001737;
    --ink-soft:#4C5C70;
    --ink-faint:#8B99A8;
    --line:#E1E7ED;

    /* primary interactive accent (brand blue) */
    --brass:#00778F;
    --brass-deep:#00627A;
    --brass-soft: rgba(0,119,143,0.10);

    /* score bands: teal=good(green), amber=medium(blue), rust=needs attention(orange) */
    --teal:#0F9B57;
    --teal-soft: rgba(15,155,87,0.12);
    --amber:#00778F;
    --amber-soft: rgba(0,119,143,0.10);
    --rust:#E8690A;
    --rust-soft: rgba(232,105,10,0.12);

    --shadow: 0 20px 45px -24px rgba(0,23,55,0.22);
    --grad-1:#00778F;
    --grad-2:#39AEA6;
    --grad-3:#0F9B57;
    --grad-4:#E8690A;
  }
  *{box-sizing:border-box; margin:0; padding:0;}
  html{scroll-behavior:smooth;}
  body{
    background:
      radial-gradient(circle at 6% -4%, rgba(0,119,143,0.10), transparent 34%),
      radial-gradient(circle at 100% 10%, rgba(15,155,87,0.09), transparent 36%),
      radial-gradient(circle at 20% 100%, rgba(232,105,10,0.07), transparent 40%),
      var(--paper);
    background-attachment:fixed;
    color:var(--ink);
    font-family:'Heebo', sans-serif;
    line-height:1.6;
    min-height:100vh;
  }
  h1,h2,h3,h4{ font-family:'Rubik', sans-serif; font-weight:700; color:var(--ink); letter-spacing:-0.01em; }
  strong, b{ color:var(--ink); font-weight:700; }
  ::selection{ background:var(--brass-soft); }
  a{ color:inherit; }
  button{ font-family:inherit; cursor:pointer; }

  /* ---------- Layout ---------- */
  .app{ display:flex; min-height:100vh; }
  .sidebar{
    width:322px; flex:0 0 322px;
    background:
      radial-gradient(circle at 15% 0%, rgba(57,174,166,0.20), transparent 55%),
      var(--navy);
    color:#EAF1F6;
    padding:30px 24px;
    position:sticky; top:0; height:100vh; overflow-y:auto; overflow-x:hidden;
  }
  .brand{ margin-bottom:8px; }
  .logo-wordmark{
    display:flex; align-items:center; justify-content:flex-start; width:100%;
    margin-bottom:24px;
    padding-bottom:20px; border-bottom:1px solid rgba(255,255,255,0.14);
  }
  .logo-wordmark img{ height:20px; width:auto; max-width:180px; display:block; object-fit:contain; filter:brightness(0) invert(1); }
  .logo-sub{ font-size:0.62rem; letter-spacing:0.22em; color:#8FA3B8; margin-top:6px; font-weight:600; }

  .brand .mark{
    width:48px;height:48px;border-radius:50%;
    background:conic-gradient(from -40deg, var(--grad-1), var(--grad-2), var(--grad-3), var(--grad-4), var(--grad-1));
    display:flex;align-items:center;justify-content:center;
    margin-bottom:16px;
  }
  .brand .mark::after{
    content:"";width:28px;height:28px;border-radius:50%;
    background:var(--navy);
  }
  .brand h1{ color:#fff; font-size:1.3rem; line-height:1.3; font-weight:700; }
  .brand p{ color:#FFB463; font-size:0.92rem; font-weight:600; margin-top:8px; letter-spacing:.01em;}

  nav.steps{ display:flex; flex-direction:column; gap:3px; margin-top:22px; }
  nav.steps button{
    all:unset; cursor:pointer;
    display:flex; align-items:center; gap:10px;
    padding:11px 12px; border-radius:10px;
    color:#DCE5EF; font-size:0.98rem; font-weight:500;
    transition:background .15s ease, color .15s ease;
  }
  nav.steps button .dot{
    width:8px;height:8px;border-radius:50%;
    background:#294662; flex:0 0 auto;
    transition:background .15s ease, transform .15s ease;
  }
  nav.steps button:hover{ background:rgba(255,255,255,0.07); color:#fff; }
  nav.steps button.active{
    background:rgba(57,174,166,0.20);
    color:#fff; font-weight:700;
  }
  nav.steps button.active .dot{ background:var(--grad-2); transform:scale(1.3); }
  nav.steps button.about-item{ margin-top:14px; padding-top:17px; border-top:1px solid rgba(255,255,255,0.14); }
  nav.steps button.about-item .dot{ background:var(--grad-4); }
  nav.steps button.about-item.active{ background:rgba(232,105,10,0.20); }
  nav.steps button.about-item.active .dot{ background:var(--grad-4); box-shadow:0 0 8px 1px rgba(232,105,10,0.6); }
  nav.steps button .lbl{ flex:1; text-align:right; }
  nav.steps button .prog{ font-size:0.68rem; color:#8296AC; font-family:'Heebo'; }

  .sidebar .footer-note{
    margin-top:28px; padding-top:18px; border-top:1px solid rgba(255,255,255,0.18);
    font-size:0.8rem; color:#B0BFCF; line-height:1.75;
  }
  .sidebar .footer-note b, .sidebar .footer-note strong{ color:#D9E3ED; }

  main{ flex:1; min-width:0; }
  .screen{ display:none; animation:fadeIn .35s ease; }
  .screen.active{ display:block; }
  @keyframes fadeIn{ from{opacity:0; transform:translateY(6px);} to{opacity:1; transform:none;} }

  .wrap{ max-width:880px; margin:0 auto; padding:56px 40px 90px; }

  .eyebrow{
    display:inline-flex; align-items:center; gap:8px;
    font-size:0.86rem; letter-spacing:.08em; color:var(--brass-deep);
    font-weight:700; margin-bottom:14px; text-transform:uppercase;
  }
  .eyebrow::before{ content:""; width:22px; height:2px; border-radius:2px; background:linear-gradient(90deg, var(--grad-1), var(--grad-2)); }

  h2.title{ font-size:2.25rem; margin-bottom:10px; }
  .subtitle{ color:var(--ink-soft); font-size:1.05rem; max-width:640px; margin-bottom:30px;}

  .card{
    position:relative;
    background:var(--card); border:1px solid var(--line); border-radius:20px;
    padding:26px 28px; box-shadow:var(--shadow);
    overflow:hidden;
  }
  .card::before{
    content:""; position:absolute; inset-inline-start:0; top:0; height:4px; width:100%;
    background:linear-gradient(90deg, var(--grad-1), var(--grad-2), var(--grad-3), var(--grad-4));
    opacity:0.9;
  }
  .stack{ display:flex; flex-direction:column; gap:18px; }

  /* ---------- Compass gauge (signature element) ---------- */
  .compass{
    position:relative; width:150px; height:150px; border-radius:50%;
    display:flex; align-items:center; justify-content:center; flex:0 0 auto;
  }
  .compass .orbit{
    position:absolute; inset:-9px; border-radius:50%;
    border:1.5px dashed var(--line);
    animation: spin 20s linear infinite;
  }
  @keyframes spin{ to{ transform:rotate(360deg); } }
  .compass .ring{
    position:absolute; inset:0; border-radius:50%;
    background: conic-gradient(from -90deg, var(--gauge-color, var(--brass)) calc(var(--pct,0)*1%), var(--paper-alt) 0);
    transition: background 0.6s ease;
  }
  .compass .ring::after{
    content:""; position:absolute; inset:12px; border-radius:50%;
    background:var(--card-solid); border:1px solid var(--line); box-shadow:0 4px 14px -6px rgba(0,23,55,0.18);
  }
  .compass .needle-core{
    position:relative; text-align:center; z-index:2;
  }
  .compass .needle-core b{ display:block; font-family:'Rubik'; font-weight:800; font-size:1.6rem; }
  .compass .needle-core span{ display:block; font-size:0.66rem; color:var(--ink-soft); margin-top:2px; }
  .compass.small{ width:80px; height:80px; }
  .compass.small .orbit{ inset:-6px; }
  .compass.small .ring::after{ inset:7px; }
  .compass.small .needle-core b{ font-size:1.05rem; }
  .compass.small .needle-core span{ font-size:0.56rem; }

  /* ---------- Hero (intro) ---------- */
  .hero{
    display:flex; align-items:center; gap:40px; margin-bottom:38px;
    background:
      radial-gradient(circle at 88% 8%, rgba(57,174,166,0.55), transparent 45%),
      radial-gradient(circle at 8% 105%, rgba(232,105,10,0.35), transparent 45%),
      linear-gradient(135deg, var(--navy) 0%, #072B4F 100%);
    color:#fff; border-radius:26px; padding:42px 44px; position:relative; overflow:hidden;
  }
  .hero::before{
    content:""; position:absolute; inset:0;
    background-image: radial-gradient(circle at 80% 30%, rgba(0,119,143,0.45), transparent 55%);
  }
  .hero-text{ position:relative; z-index:1; flex:1; }
  .hero-text .eyebrow{ color:#7FE0D6; font-size:0.95rem; }
  .hero-text .eyebrow::before{ background:linear-gradient(90deg, var(--grad-2), var(--grad-3)); }
  .hero-text h1{ color:#fff; font-size:2.4rem; line-height:1.25; margin-bottom:14px; }
  .hero-text h1 .grad-word{
    background:linear-gradient(90deg, var(--grad-2), var(--grad-4));
    -webkit-background-clip:text; background-clip:text; color:transparent;
  }
  .hero-text p{ color:#C4D3E0; max-width:520px; font-size:1rem; }
  .hero-compass{ position:relative; z-index:1; flex:0 0 auto; }
  .hero-compass .ring::after{ background:#0D2E52; border-color:rgba(255,255,255,0.18); }
  .hero-compass .orbit{ border-color:rgba(255,255,255,0.28); }
  .hero-compass .needle-core b, .hero-compass .needle-core span{ color:#fff; }

  .quote-block{
    border-right:3px solid transparent;
    border-image: linear-gradient(180deg, var(--grad-1), var(--grad-3)) 1;
    padding:6px 20px 6px 4px;
    font-family:'Rubik'; font-weight:600; font-size:1.15rem; color:var(--ink); margin:26px 0;
  }
  .quote-block cite{ display:block; font-family:'Heebo'; font-weight:400; font-style:normal; font-size:0.82rem; color:var(--ink-soft); margin-top:8px;}

  .grid-4{ display:grid; grid-template-columns:repeat(2,1fr); gap:16px; margin:30px 0; }
  .mini-card{ position:relative; background:var(--card); border:1px solid var(--line); border-radius:18px; padding:18px 20px; overflow:hidden; box-shadow:var(--shadow); }
  .mini-card::before{ content:""; position:absolute; inset-inline-start:0; top:0; height:4px; width:100%; background:linear-gradient(90deg, var(--grad-1), var(--grad-2), var(--grad-3), var(--grad-4)); opacity:0.9; }
  .mini-card .num{ font-family:'Rubik'; color:var(--brass-deep); font-size:0.85rem; font-weight:800; margin-bottom:6px; }
  .mini-card h4{ font-size:1rem; margin-bottom:6px; }
  .mini-card p{ font-size:0.86rem; color:var(--ink-soft); }

  .roadmap-strip{
    display:flex; align-items:center; gap:14px; flex-wrap:wrap;
    background:var(--card); border:1px solid var(--line); border-radius:18px;
    padding:22px 24px; margin-bottom:34px; box-shadow:var(--shadow);
  }
  .rm-step{ display:flex; align-items:flex-start; gap:12px; flex:1; min-width:180px; }
  .rm-num{
    flex:0 0 auto; width:30px; height:30px; border-radius:50%;
    background:var(--brass-soft); color:var(--brass-deep);
    display:flex; align-items:center; justify-content:center;
    font-family:'Rubik'; font-weight:800; font-size:0.9rem;
  }
  .rm-step b{ display:block; font-size:0.9rem; margin-bottom:3px; }
  .rm-step span{ display:block; font-size:0.78rem; color:var(--ink-soft); line-height:1.5; }
  .rm-arrow{ color:var(--ink-faint); font-size:1.1rem; flex:0 0 auto; }
  @media (max-width:880px){ .rm-arrow{ display:none; } .roadmap-strip{ flex-direction:column; align-items:stretch; } }

  .btn{
    display:inline-flex; align-items:center; gap:8px;
    background:linear-gradient(90deg, var(--grad-1), var(--grad-2));
    color:#fff; border:none; border-radius:999px;
    padding:12px 24px; font-weight:700; font-size:0.92rem;
    transition:transform .15s ease, box-shadow .15s ease;
  }
  .btn:hover{ transform:translateY(-1px); box-shadow:0 10px 24px -10px rgba(0,119,143,0.55); }
  .btn.ghost{ background:transparent; color:var(--ink); border:1.5px solid var(--line); }
  .btn.ghost:hover{ background:var(--paper-alt); box-shadow:none; }
  .btn.ghost.on-dark{ color:#fff; border-color:rgba(255,255,255,0.35); }
  .btn.ghost.on-dark:hover{ background:rgba(255,255,255,0.12); }
  .btn.alt{
    background:linear-gradient(90deg, var(--grad-4), #FF8A3D);
    color:#fff;
  }
  .btn.alt:hover{ box-shadow:0 10px 24px -10px rgba(232,105,10,0.55); }

  /* ---------- Insight cards ---------- */
  .insight{
    position:relative; overflow:hidden;
    background:var(--card); border:1px solid var(--line); border-radius:20px;
    padding:26px 28px; margin-bottom:18px; box-shadow:var(--shadow);
    transition:transform .2s ease, box-shadow .2s ease;
  }
  .insight:hover{ transform:translateY(-2px); }
  .insight::before{ content:""; position:absolute; inset-inline-start:0; top:0; height:4px; width:100%; background:linear-gradient(90deg, var(--grad-1), var(--grad-2)); }
  .insight-head{ display:flex; align-items:flex-start; gap:16px; margin-bottom:12px; }
  .insight-head .num-badge{
    flex:0 0 auto; width:42px; height:42px; border-radius:13px;
    background:var(--brass-soft); color:var(--brass-deep);
    display:flex; align-items:center; justify-content:center;
    font-family:'Rubik'; font-weight:800; font-size:1.05rem;
  }
  .insight-head h3{ font-size:1.25rem; line-height:1.4; }
  .insight-tag{ font-size:0.78rem; color:var(--ink-faint); margin-top:5px; font-weight:600; }
  .insight p.body-txt{ color:var(--ink-soft); margin-bottom:14px; }
  .insight .from-to{
    display:flex; align-items:center; gap:10px; margin-bottom:14px;
    font-family:'Rubik'; font-weight:600; font-size:0.98rem; color:var(--ink);
    background:var(--paper-alt); border:1px solid var(--line); border-radius:10px; padding:10px 14px; width:fit-content;
  }
  .insight .from-to .arrow{ color:var(--teal); font-weight:700; }
  details.disc{ border-top:1px dashed var(--line); padding-top:10px; }
  details.disc summary{
    cursor:pointer; font-size:1rem; font-weight:700; color:var(--brass-deep);
    list-style:none; display:flex; align-items:center; gap:6px;
  }
  details.disc summary::-webkit-details-marker{ display:none; }
  details.disc summary::before{ content:"◂"; transition:transform .2s ease; font-size:0.7rem; }
  details.disc[open] summary::before{ transform:rotate(-90deg); }
  details.disc ul{ margin:12px 4px 0; padding-right:18px; font-size:1rem; color:var(--ink-soft); display:flex; flex-direction:column; gap:9px; line-height:1.6;}
  .open-questions ul{ padding-right:20px; font-size:1rem; color:var(--ink-soft); display:flex; flex-direction:column; gap:10px; line-height:1.6; }
  .open-questions li::marker{ color:var(--brass-deep); }

  /* ---------- Rating scale ---------- */
  .q-item{
    display:flex; align-items:center; justify-content:space-between; gap:16px;
    padding:16px 0; border-bottom:1px solid var(--line);
  }
  .q-item:last-child{ border-bottom:none; }
  .q-item .q-text{ font-size:0.95rem; flex:1; }
  .scale{ display:flex; gap:6px; flex:0 0 auto; }
  .scale button{
    all:unset; width:34px; height:34px; border-radius:50%;
    border:1.5px solid var(--line); display:flex; align-items:center; justify-content:center;
    font-size:0.82rem; color:var(--ink-soft); transition:all .15s ease;
  }
  .scale button:hover{ border-color:var(--brass); color:var(--brass-deep); }
  .scale button.sel{
    background:linear-gradient(135deg, var(--grad-1), var(--grad-2));
    border-color:transparent; color:#fff; font-weight:800;
  }

  .score-panel{
    display:flex; align-items:center; gap:24px; margin-top:26px;
    background:var(--paper-alt); border:1px solid var(--line); border-radius:20px; padding:22px 26px;
  }
  .score-panel .txt{ flex:1; }
  .score-panel .txt .band{ font-family:'Rubik'; font-weight:800; font-size:1.15rem; margin-bottom:6px; }
  .score-panel .txt p{ font-size:0.9rem; color:var(--ink-soft); }
  .score-panel .fine{ font-size:0.78rem; color:var(--ink-faint); margin-top:8px; }

  .gaps-list{ display:flex; flex-direction:column; gap:8px; margin-top:12px; }
  .gap-row{ display:flex; align-items:center; gap:10px; background:var(--card); border:1px solid var(--line); border-radius:10px; padding:9px 12px; }
  .gap-score{ flex:0 0 auto; font-family:'Rubik'; font-weight:800; font-size:0.8rem; color:var(--rust); background:var(--rust-soft); border-radius:999px; padding:3px 9px; }
  .gap-txt{ font-size:0.87rem; color:var(--ink); }
  .gap-row{ align-items:flex-start; }
  .gap-tip{ display:block; font-size:0.8rem; color:var(--ink-soft); margin-top:4px; }
  .gap-row.strength .gap-score{ color:var(--teal); background:var(--teal-soft); }

  .lever-block{ margin-bottom:26px; }
  .lever-title{ display:flex; align-items:center; gap:12px; margin-bottom:6px; }
  .lever-title .icon{
    width:36px;height:36px;border-radius:11px; background:var(--brass-soft); color:var(--brass-deep);
    display:flex; align-items:center; justify-content:center; font-size:1rem;
  }
  .lever-title h4{ font-size:1.05rem; }
  .lever-title .lever-score{ margin-inline-start:auto; font-size:0.85rem; color:var(--ink-soft); font-weight:600; }
  .lever-verdict{ display:flex; align-items:center; gap:10px; margin-top:12px; padding:0 2px; flex-wrap:wrap; }
  .lever-verdict span:last-child{ font-size:0.85rem; color:var(--ink-soft); flex:1; min-width:200px; }

  /* ---------- Warning signs ---------- */
  .sign-card{ display:flex; gap:16px; background:var(--card); border:1px solid var(--line); border-radius:18px; padding:20px 22px; margin-bottom:14px; box-shadow:var(--shadow); }
  .sign-card .idx{ font-family:'Rubik'; font-weight:800; font-size:1.4rem; color:transparent; -webkit-text-stroke:1.3px var(--brass-deep); flex:0 0 auto; }
  .sign-card h4{ font-size:1rem; margin-bottom:6px; }
  .sign-card p{ font-size:0.87rem; color:var(--ink-soft); }

  .checklist{ display:flex; flex-direction:column; gap:2px; }
  .chk-item{ display:flex; align-items:center; gap:12px; padding:12px 14px; border-radius:10px; transition:background .15s ease; cursor:pointer; }
  .chk-item:hover{ background:var(--paper-alt); }
  .chk-item .box{
    width:22px; height:22px; border-radius:7px; border:1.5px solid var(--line);
    display:flex; align-items:center; justify-content:center; flex:0 0 auto; color:transparent; font-size:0.8rem;
    transition:all .15s ease;
  }
  .chk-item.on .box{ background:linear-gradient(135deg, var(--grad-4), var(--brass)); border-color:transparent; color:#fff; }
  .chk-item .lbl{ font-size:0.9rem; }

  /* ---------- Risk map table ---------- */
  .risk-table{ width:100%; border-collapse:collapse; margin-top:10px; }
  .risk-table th{ text-align:right; font-size:0.75rem; color:var(--ink-soft); font-weight:600; padding:8px 10px; border-bottom:1.5px solid var(--line); }
  .risk-table td{ padding:10px; border-bottom:1px solid var(--line); vertical-align:middle; }
  .risk-table input[type="text"]{
    width:100%; border:1px solid var(--line); border-radius:8px; padding:8px 10px;
    font-family:inherit; font-size:0.88rem; background:var(--paper-alt); color:var(--ink);
  }
  .risk-table input[type="range"]{ width:100%; accent-color:var(--brass); }
  .rangeval{ font-size:0.78rem; color:var(--ink-soft); text-align:center; display:block; margin-top:2px;}
  .risk-badge{
    display:inline-block; padding:5px 12px; border-radius:999px; font-size:0.78rem; font-weight:700;
  }
  .risk-badge.high{ background:var(--rust-soft); color:var(--rust); }
  .risk-badge.med{ background:var(--amber-soft); color:var(--amber); }
  .risk-badge.low{ background:var(--teal-soft); color:var(--teal); }
  .risk-legend{ display:flex; flex-direction:column; gap:12px; }
  .rl-row{ display:flex; align-items:flex-start; gap:12px; flex-wrap:wrap; }
  .rl-row .risk-badge{ flex:0 0 auto; margin-top:2px; }
  .rl-row span:last-child{ flex:1; min-width:220px; font-size:0.87rem; color:var(--ink-soft); line-height:1.6; }
  .del-row{ all:unset; cursor:pointer; color:var(--ink-faint); font-size:1.1rem; padding:4px 8px; }
  .del-row:hover{ color:var(--rust); }

  /* ---------- Summary ---------- */
  .summary-grid{ display:grid; grid-template-columns:repeat(2, 1fr); gap:16px; margin-bottom:30px; }
  .sum-card{ background:var(--card); border:1px solid var(--line); border-radius:18px; padding:20px 22px; display:flex; align-items:center; gap:16px; box-shadow:var(--shadow); }
  .sum-card .info{ flex:1; }
  .sum-card h4{ font-size:0.95rem; margin-bottom:4px; }
  .sum-card p{ font-size:0.78rem; color:var(--ink-soft); }
  .sum-card .not-done{ font-size:0.78rem; color:var(--ink-faint); font-style:italic; }

  .final-q{ background:var(--card); border:1px solid var(--line); border-radius:16px; padding:18px 22px; margin-bottom:12px; display:flex; gap:14px; align-items:flex-start; box-shadow:var(--shadow);}
  .final-q .qn{ font-family:'Rubik'; color:var(--brass-deep); font-weight:800; }

  footer.credit{ text-align:center; color:var(--ink-faint); font-size:0.8rem; margin-top:50px; padding-top:20px; border-top:1px solid var(--line); }

  .client-list{ display:flex; flex-wrap:wrap; gap:10px; }
  .client-chip{
    display:inline-flex; align-items:center;
    background:var(--paper-alt); border:1px solid var(--line); border-radius:999px;
    padding:8px 16px; font-size:0.85rem; font-weight:600; color:var(--ink);
  }
  .cta-card::before{ background:linear-gradient(90deg, var(--grad-4), var(--grad-1)); }

  /* mobile nav toggle */
  .mobile-bar{ display:none; }

  @media (max-width: 880px){
    .app{ flex-direction:column; }
    .sidebar{ width:100%; flex:none; position:relative; height:auto; padding:16px; }

    .summary-grid{ grid-template-columns:1fr; }
    .score-panel{ flex-direction:column; text-align:center; }
  }

  @media print{

const INSIGHTS = [
  { n:1, title:'מאיום על התפקיד לאיום על הזהות', from:'תפקיד', to:'זהות',
    question:'האם אנחנו מבינים מה קורה לזהות המקצועית של העובדים שלנו כש-AI נכנס לתמונה?',
    body:'ההתנגדות העמוקה ביותר לשינוי בעידן ה-AI לרוב אינה קשורה לטכנולוגיה עצמה. כאשר כלי AI מסוגל לבצע חלק מהמשימות שהגדירו את המומחיות של אדם, השאלה שעולה אצלו אינה רק "איך אני עובד עכשיו" אלא שאלה עמוקה הרבה יותר - "מי אני מקצועית, אם המחשב יודע לעשות את מה שרק אני ידעתי לעשות". <strong>זו לא התנגדות רציונלית שניתן לפתור בהסבר טכני - זו תגובה פסיכולוגית לאיום על הזהות המקצועית (Identity Transition), וההתעלמות ממנה היא אחד הגורמים המשמעותיים ביותר לכישלון שינויים.</strong> במקביל, המנהלים עצמם עוברים את אותו תהליך: התפקיד הניהולי הופך בהדרגה מ"הפונקציה שיודעת" ל"פונקציה תומכת שלומדת יחד עם הצוות" - שינוי זהות ניהולי, לא רק מיומנות חדשה.',
    q:['האם המנהלים שלנו יודעים לזהות כאשר התנגדות לשינוי היא למעשה איום זהותי, ולא רק חשש טכני או תפעולי?','כיצד אנחנו תומכים בעובדים שחשים שהמומחיות שהם בנו לאורך שנים "מאבדת ערך"?','האם המנהלים שלנו מוכנים לעבור בעצמם ממעמד של "המומחה שיודע" למעמד של שותף לומד לצד הצוות?'] },
  { n:2, title:'מיתרון של ידע ליתרון של למידה', from:'ידע', to:'למידה',
    question:'האם אנחנו עדיין מעריכים אנשים בעיקר על הידע שיש להם - או על היכולת שלהם ללמוד מהר?',
    body:'במשך שנים ארגונים גייסו, קידמו והעריכו אנשים בעיקר על בסיס הידע והניסיון שצברו. בעולם שבו מידע זמין בלחיצת כפתור וכלי AI מסוגלים לייצר תוכן, לנתח מידע ולהציע פתרונות בתוך שניות — הידע לבדו כבר אינו מספיק. היתרון עובר לאנשים ולארגונים שמסוגלים ללמוד מהר יותר, להסתגל מהר יותר, ולשנות הרגלים מהר יותר. <strong>במילים אחרות: המיומנות החשובה ביותר של השנים הקרובות אינה בהכרח AI — היא היכולת ללמוד.</strong>',
    q:['האם תרבות הלמידה שלנו תומכת בהתנסות ולמידה מתמשכת?','אילו אוכלוסיות בארגון עשויות להתקשות יותר בהסתגלות?','כיצד אנו מפתחים כיום את יכולת הלמידה של העובדים והמנהלים?'] },
  { n:3, title:'מתפקידים יציבים לתפקידים דינמיים', from:'יציב', to:'דינמי',
    question:'האם אנחנו יודעים אילו תפקידים אצלנו ישתנו משמעותית בשנתיים הקרובות?',
    body:'אחד המאפיינים הבולטים של עידן ה-AI הוא שתפקידים אינם נשארים קבועים לאורך זמן. משימות נעלמות, משימות חדשות נוצרות, חלק מהעבודה עובר לאוטומציה וחלק אחר הופך מורכב ואנושי יותר. המשמעות היא שתפקידים יהפכו גמישים ודינמיים יותר מאי פעם. <strong>השאלה כבר אינה "מה התפקיד שלי?" אלא "מה הערך שאני מביא?"</strong>',
    q:['אילו תפקידים בארגון צפויים להשתנות משמעותית בשנתיים הקרובות?','אילו מיומנויות חדשות יידרשו?','האם קיימת אצלנו אסטרטגיית Reskilling ו-Upskilling ברורה?'] },
  { n:4, title:'ממנהלים מפקחים למנהלים מובילי שינוי', from:'פיקוח', to:'הובלה',

/* =========================================================
   HELPERS
   ========================================================= */
function pct(val, max){ return Math.max(0, Math.min(100, Math.round((val/max)*100))); }

function bandColor(pctVal){
  if(pctVal >= 75) return 'var(--teal)';
  if(pctVal >= 50) return 'var(--amber)';
  return 'var(--rust)';
}

function compassHTML(valueLabel, sub, pctVal, size){
  const color = bandColor(pctVal);
  return `<div class="compass ${size==='small'?'small':''}" style="--pct:${pctVal}; --gauge-color:${color};">
    <div class="orbit"></div>
    <div class="ring"></div>
    <div class="needle-core"><b>${valueLabel}</b><span>${sub}</span></div>
  </div>`;
}

function sum(arr){ return arr.reduce((a,b)=> a + (b||0), 0); }
function filledCount(arr){ return arr.filter(v=>v!==null && v!==undefined).length; }

// Returns the lowest-scoring items (value <= threshold), sorted weakest-first.
// Falls back to the single weakest item if none are at/under the threshold, so there's always something concrete to point to.
function lowestItems(items, values, threshold=2){
  const pairs = items.map((txt,i)=>({txt, val:values[i], idx:i})).filter(p=>p.val!==null && p.val!==undefined);
  let lows = pairs.filter(p=>p.val<=threshold).sort((a,b)=>a.val-b.val);
  if(lows.length===0 && pairs.length){
    const minVal = Math.min(...pairs.map(p=>p.val));
    if(minVal <= 3) lows = pairs.filter(p=>p.val===minVal);
  }
  return lows.slice(0,4);
}

function highestItems(items, values, threshold=4){
  const pairs = items.map((txt,i)=>({txt, val:values[i], idx:i})).filter(p=>p.val!==null && p.val!==undefined);
  let highs = pairs.filter(p=>p.val>=threshold).sort((a,b)=>b.val-a.val);
  if(highs.length===0 && pairs.length){
    const maxVal = Math.max(...pairs.map(p=>p.val));
    if(maxVal >= 3) highs = pairs.filter(p=>p.val===maxVal);
  }
  return highs.slice(0,3);
}

function gapsListHTML(lows, emptyMsg, tips){
  if(!lows.length) return `<p style="color:var(--ink-soft); font-size:0.88rem; margin-top:10px;">${emptyMsg}</p>`;
  return `<div class="gaps-list">
    ${lows.map(l=>`<div class="gap-row"><span class="gap-score">${l.val}/5</span><div><span class="gap-txt">${l.txt}</span>${tips && tips[l.idx] ? `<span class="gap-tip">💡 ${tips[l.idx]}</span>` : ''}</div></div>`).join('')}
  </div>`;
}

function strengthsListHTML(highs){
  if(!highs.length) return '';
  return `<div class="gaps-list">
    ${highs.map(h=>`<div class="gap-row strength"><span class="gap-score">${h.val}/5</span><span class="gap-txt">${h.txt}</span></div>`).join('')}
  </div>`;
}

function sumCardHTML(title, sub, done, valueLabel, valueSub, pctVal){
  return `<div class="sum-card">
    ${done ? compassHTML(valueLabel, valueSub, pctVal, 'small') : `<div class="compass small" style="--pct:0; --gauge-color:var(--paper-alt);"><div class="ring"></div><div class="needle-core"><b>–</b></div></div>`}
    <div class="info">
      <h4>${title}</h4>
      ${done ? `<p>${sub}</p>` : `<p class="not-done">טרם הושלם</p>`}
    </div>
  </div>`;
}

function dashboardGridHTML(){
  const mgrFilled = filledCount(state.manager)===10;
  const mgrTotal = sum(state.manager);
  const orgAll = [...state.org.leadership, ...state.org.culture, ...state.org.learning, ...state.org.trust];
  const orgFilled = filledCount(orgAll)===12;
  const orgTotal = sum(orgAll);
  const scFilled = filledCount(state.scorecard)===10;
  const scTotal = sum(state.scorecard);
  const warnCount = state.warnings.filter(Boolean).length;

  return `<div class="summary-grid">
    ${sumCardHTML('האם המנהלים יהיו צוואר הבקבוק?', mgrFilled?managerBand(mgrTotal).label:'', mgrFilled, mgrTotal, '/50', pct(mgrTotal,50))}
    ${sumCardHTML('כמה דגלי אזהרה כבר בשטח?', warnCount>0?warningBand(warnCount).label:'', warnCount>0, warnCount, '/10 סומנו', pct(warnCount,10))}
    ${sumCardHTML('כמה מוכן הארגון להשתנות שוב?', orgFilled?orgBand(orgTotal).label:'', orgFilled, orgTotal, '/60', pct(orgTotal,60))}
    ${sumCardHTML('יש לכם יסודות להצליח בשינוי הבא?', scFilled?scorecardBand(scTotal).label:'', scFilled, scTotal, '/50', pct(scTotal,50))}
  </div>`;
}

    return `<button class="${active} ${isAbout}" onclick="goTo('${s.id}')">
      <span class="dot"></span><span class="lbl">${s.label}</span>
    </button>`;
  }).join('');
}

function goTo(id){
  state.current = id;
  renderNav();
  renderMain();
  document.querySelector('nav.steps').classList.remove('open');
  window.scrollTo({top:0, behavior:'smooth'});
}
window.goTo = goTo;

/* =========================================================
   RENDER: MAIN ROUTER
   ========================================================= */
function renderMain(){
  const main = document.getElementById('main');
  let html = '';
  switch(state.current){
    case 'intro': html = renderIntro(); break;
    case 'insights': html = renderInsights(); break;
    case 'manager': html = renderManager(); break;
    case 'warnings': html = renderWarnings(); break;
    case 'riskmap': html = renderRiskMap(); break;
    case 'org': html = renderOrg(); break;
    case 'scorecard': html = renderScorecard(); break;
    case 'summary': html = renderSummary(); break;
    case 'about': html = renderAbout(); break;
  }
  main.innerHTML = `<div class="screen active"><div class="wrap">${html}</div></div>`;
  attachHandlers();
}

function riskFor(pop){
  const idx = pop.impact - (pop.readiness + pop.trust)/2;
  if(idx >= 2.5) return {label:'סיכון גבוה', cls:'high'};
  if(idx >= 0.5) return {label:'סיכון בינוני', cls:'med'};
  return {label:'סיכון נמוך', cls:'low'};
}

  const rows = state.risk.map(pop=>{

    return `<tr data-row-id="${pop.id}">

        <li>אילו מנהלים זקוקים לתמיכה נוספת?</li>
        <li>אילו אוכלוסיות נמצאות בסיכון לשחיקה?</li>
        <li>האם אנו מודדים את רמת האמון בארגון?</li>
        <li>כיצד נדע בעוד שישה חודשים שהשינוי באמת מצליח?</li>

/* =========================================================
   SCREEN: ORG QUESTIONNAIRE (4 LEVERS)
   ========================================================= */
function orgBand(total){
  if(total>=48) return {label:'48–60 נקודות', text:'<strong>הארגון נמצא במצב טוב להתמודד עם שינוי מתמשך.</strong>'};
  if(total>=36) return {label:'36–47 נקודות', text:'<strong>קיימים פערים שדורשים תשומת לב.</strong>'};
  return {label:'מתחת ל-36 נקודות', text:'<strong>קיים סיכון משמעותי ליכולת ההסתגלות הארגונית.</strong>'};
}

function leverBand(total){
  if(total>=12) return {label:'חוזקה', cls:'low', text:'נקודת חוזק אצלכם - אפשר לבנות עליה ולמנף אותה גם באזורים אחרים.'};
  if(total>=8) return {label:'בפיתוח', cls:'med', text:'יש בסיס סביר, אך נדרש חיזוק ממוקד כדי שזה יהפוך לחוזקה אמיתית.'};
  return {label:'צוואר בקבוק', cls:'high', text:'זהו כנראה אחד החסמים המרכזיים להצלחת השינוי אצלכם - כדאי להתחיל כאן.'};
}

function renderOrg(){
  const blocks = LEVERS.map(lev=>{
    const arr = state.org[lev.key];
    const leverTotal = sum(arr);
    const leverFilled = filledCount(arr)===3;
    const items = lev.items.map((txt,i)=>`
      <div class="q-item">
        <div class="q-text">${txt}</div>
        <div class="scale">
          ${[1,2,3,4,5].map(v=>`<button data-org-lever="${lev.key}" data-idx="${i}" data-val="${v}" class="${arr[i]===v?'sel':''}">${v}</button>`).join('')}
        </div>
      </div>`).join('');
    const verdict = leverFilled ? (()=>{ const lb = leverBand(leverTotal); return `<div class="lever-verdict"><span class="risk-badge ${lb.cls}">${lb.label}</span><span>${lb.text}</span></div>`; })() : '';
    return `<div class="lever-block">
      <div class="lever-title"><div class="icon">${lev.icon}</div><h4>${lev.title}</h4><div class="lever-score">${leverTotal}/15</div></div>
      <div class="card">${items}</div>
      ${verdict}
    </div>`;
  }).join('');

  const allVals = [...state.org.leadership, ...state.org.culture, ...state.org.learning, ...state.org.trust];
  const filled = filledCount(allVals);
  const total = sum(allVals);

  let panel = '';
  if(filled===12){
    const b = orgBand(total);
    const leverTotals = LEVERS.map(lev=>({title:lev.title, total:sum(state.org[lev.key])}));
    const best = leverTotals.reduce((a,b)=> b.total>a.total ? b : a);
    const worst = leverTotals.reduce((a,b)=> b.total<a.total ? b : a);
    panel = `<div class="score-panel">
      ${compassHTML(total, 'מתוך 60', pct(total,60))}
      <div class="txt"><div class="band">${b.label}</div><p>${b.text}</p></div>
    </div>
    ${best.title!==worst.title ? `<div class="card" style="margin-top:16px;">
      <h4 style="font-size:0.98rem; margin-bottom:10px;">איפה כדאי להתחיל?</h4>
      <div class="gaps-list">
        <div class="gap-row strength"><span class="gap-score">${best.total}/15</span><span class="gap-txt"><strong>${best.title}</strong> - נקודת החוזק שלכם. אפשר למנף אותה כדי לתמוך במנופים אחרים.</span></div>
        <div class="gap-row"><span class="gap-score">${worst.total}/15</span><span class="gap-txt"><strong>${worst.title}</strong> - כנראה צוואר הבקבוק המרכזי אצלכם כרגע. כדאי להתחיל כאן.</span></div>
      </div>
    </div>` : ''}`;
  } else {
    panel = `<div class="score-panel"><div class="txt"><p style="color:var(--ink-faint);">דרגו את כל 12 ההיגדים כדי לקבל תוצאה כוללת (${filled}/12 הושלמו).</p></div></div>`;
  }

  return `
    <div class="eyebrow">כלי עבודה #4</div>
    <h2 class="title">מדד המוכנות הארגונית לשינוי</h2>
    <p class="subtitle"><strong>ארבעת המנופים של ארגון בעל יכולת שינוי גבוהה: מנהיגות, תרבות, למידה ואמון.</strong> דרגו כל סעיף בין 1 ל-5.</p>
    ${blocks}
    ${panel}
    <div class="card" style="margin-top:24px;">
      <h4 style="font-size:1rem; margin-bottom:8px;">תרגיל הנהלה</h4>
      <p style="color:var(--ink-soft); font-size:0.9rem;">אם בעוד שנתיים 30%–40% מהעבודה בארגון שלכם תיראה אחרת — איזה מבין ארבעת המנופים (מנהיגות / תרבות / למידה / אמון) יהווה כיום את צוואר הבקבוק הגדול ביותר? ולמה?</p>
    </div>
    <div style="text-align:left; margin-top:20px;"><button class="btn" onclick="goTo('scorecard')">להמשך: Change Capability Scorecard ←</button></div>
  `;
}

/* =========================================================
   SCREEN: SCORECARD
   ========================================================= */
function scorecardBand(total){
  if(total>=40) return {label:'40–50', text:'הארגון נמצא ברמת מוכנות גבוהה. <strong>קיימים יסודות חזקים להובלת שינוי מתמשך.</strong>'};
  if(total>=30) return {label:'30–39', text:'<strong>קיימים יסודות טובים, אך ישנם מספר תחומים שדורשים חיזוק.</strong>'};
  if(total>=20) return {label:'20–29', text:'<strong>השינוי צפוי לפגוש חסמים משמעותיים.</strong> מומלץ להתמקד במנהלים, אמון ותרבות למידה.'};
  return {label:'מתחת ל-20', text:'<strong>הסיכון המרכזי אינו טכנולוגי. הוא ארגוני ואנושי.</strong>'};
}

function renderScorecard(){
  const filled = filledCount(state.scorecard);
  const total = sum(state.scorecard);
  const items = SCORECARD_ITEMS.map((txt,i)=>`
    <div class="q-item">
      <div class="q-text">${txt}</div>

      </div>
    </div>
  `).join('');

  let panel = '';
  if(filled===10){
    const b = scorecardBand(total);
    const lows = lowestItems(SCORECARD_ITEMS, state.scorecard, 2);
    const highs = highestItems(SCORECARD_ITEMS, state.scorecard, 4);
    panel = `<div class="score-panel">
      ${compassHTML(total, 'מתוך 50', pct(total,50))}
      <div class="txt"><div class="band">${b.label}</div><p>${b.text}</p></div>
    </div>
    <div class="card" style="margin-top:16px;">
      <h4 style="font-size:0.98rem; margin-bottom:4px;">הפערים הבולטים ביותר לפי התשובות שלכם</h4>

    </div>
    ${highs.length ? `<div class="card" style="margin-top:16px;">
      <h4 style="font-size:0.98rem; margin-bottom:4px;">החוזקות הבולטות ביותר</h4>
      ${strengthsListHTML(highs)}
    </div>` : ''}`;
  } else {
    panel = `<div class="score-panel"><div class="txt"><p style="color:var(--ink-faint);">דרגו את כל 10 הסעיפים כדי לקבל את התוצאה (${filled}/10 הושלמו).</p></div></div>`;
  }

  return `
    <div class="eyebrow">Change Capability Scorecard</div>
    <h2 class="title">עד כמה הארגון שלכם מוכן לעידן של שינוי מתמשך?</h2>

    <div class="card">${items}</div>
    ${panel}

    <div style="text-align:left; margin-top:20px;"><button class="btn" onclick="goTo('summary')">להמשך: סיכום ←</button></div>
  `;
}

/* =========================================================
   EVENT HANDLERS
   ========================================================= */
function attachHandlers(){
  // simple rating scales (manager / scorecard)
  document.querySelectorAll('.scale button[data-group]').forEach(btn=>{
    btn.addEventListener('click', ()=>{
      const group = btn.dataset.group;
      const idx = parseInt(btn.dataset.idx);
      const val = parseInt(btn.dataset.val);
      const arr = group==='manager' ? state.manager : state.scorecard;
      arr[idx] = (arr[idx]===val) ? null : val; // click again to unselect
      renderMain();
    });
  });

  // org lever scales
  document.querySelectorAll('.scale button[data-org-lever]').forEach(btn=>{
    btn.addEventListener('click', ()=>{
      const lever = btn.dataset.orgLever;
      const idx = parseInt(btn.dataset.idx);
      const val = parseInt(btn.dataset.val);
      const arr = state.org[lever];
      arr[idx] = (arr[idx]===val) ? null : val;
      renderMain();
    });
  });

  // warning checklist
  document.querySelectorAll('.chk-item[data-warn-idx]').forEach(el=>{
    el.addEventListener('click', ()=>{
      const idx = parseInt(el.dataset.warnIdx);
      state.warnings[idx] = !state.warnings[idx];
      renderMain();
    });
  });

  // risk map: add row
  const addBtn = document.getElementById('addPopBtn');
  if(addBtn){
    addBtn.addEventListener('click', ()=>{
      state.riskIdSeed += 1;
      state.risk.push({ id: state.riskIdSeed, name:'', impact:3, readiness:3, trust:3 });
      renderMain();
    });
  }

  // risk map: field changes
  document.querySelectorAll('[data-risk-field]').forEach(el=>{
    el.addEventListener('input', ()=>{
      const id = parseInt(el.dataset.rowId);
      const field = el.dataset.riskField;
      const row = state.risk.find(r=>r.id===id);
      if(!row) return;
      if(field==='name'){ row.name = el.value; }
      else { row[field] = parseInt(el.value); }
      // live-update the adjacent value label + badge without full rerender for smoother sliders
      if(field!=='name'){
        const span = el.parentElement.querySelector('.rangeval');
        if(span) span.textContent = el.value;
        const tr = el.closest('tr');
        const r = riskFor(row);
        const badge = tr.querySelector('.risk-badge');
        badge.className = `risk-badge ${r.cls}`;
        badge.textContent = r.label;
      }
    });
  });

  // risk map: delete row
  document.querySelectorAll('[data-del-id]').forEach(btn=>{
    btn.addEventListener('click', ()=>{
      const id = parseInt(btn.dataset.delId);
      state.risk = state.risk.filter(r=>r.id!==id);
      renderMain();
    });
  });
}
